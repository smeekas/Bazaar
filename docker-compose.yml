services:
  server:
    depends_on:
      db:
        condition: service_healthy
    build:
      context: .
      dockerfile: ./Dockerfile.dev
    ports:
      - 7777:7777
    env_file:
      - ./.env.development
    volumes:
      -  .:/app
      - /app/node_modules
  db:
    container_name: db
    image: postgres:18
    ports:
      - 6666:5432
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bazaar
    volumes:
      - /var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bazaar"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
      
      
